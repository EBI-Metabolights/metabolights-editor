<div class="modal" [ngClass]="{ 'is-active': (loading$ | async) }">
  <div class="modal-background"></div>
  <div class="modal-content vc">
    <div class="loader-content">
      <img [src]="baseHref + 'assets/img/MetaboLightsLogo.png'" alt="MetaboLights Logo" class="loader-logo" />
      <div class="loader-progress-container">
        <div class="loader-progress-bar"></div>
      </div>
      <div class="loader-text">{{ loadingInformation$ | async }}</div>
    </div>
  </div>
</div>
