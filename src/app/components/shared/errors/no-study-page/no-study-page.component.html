<div class="columns" style="min-height: 100vh; margin: 60px 0">
  <div class="column is-8 is-offset-2">
    <div style="margin: 0 0 20px 0">
      <article class="message is-info has-shadow">
        <div class="message-header">
          <p>
            <span class="material-icons">info</span>&nbsp;{{ messageHeader }}
          </p>
        </div>
        <div class="message-body">
          {{ messageContent }}
          <br><br>
          <div class="buttons">
            <a *ngIf="isAuthenticated" class="button is-info" (click)="backToConsole()"> Back to My Studies </a>
            <a *ngIf="!isAuthenticated" class="button is-info" (click)="login()"> Login </a>
            <a class="button is-default ml" (click)="homePage()"> MetaboLights Home </a>
          </div>
        </div>
      </article>
    </div>
</div>
